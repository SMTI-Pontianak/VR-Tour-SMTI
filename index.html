<!DOCTYPE html>
<html>

<head>
    <title>WEBVR - Virtual Tour SMK/SMTI Pontianak</title>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/WaveF/aframe-gif-shader@master/dist/aframe-gif-shader.min.js"></script>
</head>

<body>
    <script src="Scripts/button-component.js"></script>

    <a-scene>
        <!-- Assets -->
        <a-assets>
            <img id="bg" src="./360/Foto_1.jpg">
            <!-- Using GIF with updated shader -->
            <img id="arrow" src="./Images/arrow.gif">
        </a-assets>

        <!-- Camera -->
        <a-entity position="0 0 0" rotation="0 120 0">
            <a-camera id="camera" look-controls wasd-controls="false" fov="80">
                <!-- Cursor -->
                <a-entity id="cursor" cursor="fuse: true; fuseTimeout: 1500" position="0 0 -1"
                    raycaster="objects: .itemButton, .itemInfo; far: 50"
                    geometry="primitive: ring; radiusInner: 0.01; radiusOuter: 0.02"
                    material="color: white; shader: flat"
                    animation__fusing="property: geometry.radiusOuter; from: 0.050; to: 0.010; startEvents: fusing; easing: easeInQuad; dur: 1000"
                    animation__fusing2="property: geometry.radiusInner; from: 0.050; to: 0.005; startEvents: fusing; easing: easeInQuad; dur: 1000">
                </a-entity>
            </a-camera>
        </a-entity>

        <!-- Background -->
        <a-sky src="#bg"></a-sky>

        <!-- Navigation Button -->
        <a-entity id="nav-button" position="1 0 4" rotation="-90 180 16">
            <!-- Using the updated GIF shader -->
            <a-entity class="itemButton" geometry="primitive: plane" gif-shader="src: ./Images/arrow.gif; transparent: true" hoverable="color:#db4035"
                clickable="name:Lantai 1; target_url:2_pintuMasuk.html" scale="1.5 1.5 1.5" position="5 -2.55 -1.5"
                rotation="0 0 -74">
            </a-entity>

            <a-text font="kelsonsans" width="6" align="center" value="Ikuti Panah\nUntuk Melanjutkan"
                position="5 -2.55 -0.5" rotation="11 -30 -75">
            </a-text>
        </a-entity>

    </a-scene>

</body>

</html>
